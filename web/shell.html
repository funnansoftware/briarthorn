    <title>Briarthorn</title>
    <style>
      /* Palette mirrors https://briarthorn.game/ (dark theme, teal accent). */
      :root {
        color-scheme: dark;
        --bg: #0b141b;          /* page background        */
        --bg-deep: #050a0f;     /* deepest surface        */
        --surface: #152029;     /* elevated surface       */
        --border: #243641;      /* hairline borders       */
        --text: #e6edee;        /* primary text           */
        --text-muted: #95a4ad;  /* secondary text         */
        --accent: #3fb8b3;      /* teal primary accent    */
        --accent-ink: #06181a;  /* text on the teal accent*/
      }

      body {
        margin: 0;
        padding: 16px;
        background-color: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }

      hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

      .emscripten { padding-right: 0; margin-left: auto; margin-right: auto; display: block; }
      textarea.emscripten {
        font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, monospace;
        width: 80%;
        background: var(--bg-deep);
        color: var(--text-muted);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px;
      }
      div.emscripten { text-align: center; }
      div.emscripten_border { border: 1px solid var(--border); background: var(--bg-deep); }
      /* the canvas *must not* have any border or padding, or mouse coords will be wrong */
      canvas.emscripten { border: 0px none; background-color: var(--bg-deep); }

      /* Loader status line and progress bar. */
      #status { color: var(--text-muted); }
      #progress { accent-color: var(--accent); }

      /* Site-style primary button for the Fullscreen control. */
      input[type="button"] {
        background: var(--accent);
        color: var(--accent-ink);
        border: 1px solid var(--accent);
        border-radius: 6px;
        padding: 6px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      input[type="button"]:hover { filter: brightness(1.08); }
      input[type="checkbox"] { accent-color: var(--accent); }

      .spinner {
        height: 50px;
        width: 50px;
        margin: 0px auto;
        -webkit-animation: rotation .8s linear infinite;
        -moz-animation: rotation .8s linear infinite;
        -o-animation: rotation .8s linear infinite;
        animation: rotation 0.8s linear infinite;
        border-left: 6px solid var(--accent);
        border-right: 6px solid var(--accent);
        border-bottom: 6px solid var(--accent);
        border-top: 6px solid var(--border);
        border-radius: 100%;
        background-color: transparent;
      }
      #spinner strong { color: var(--accent); }
      @-webkit-keyframes rotation {
        from {-webkit-transform: rotate(0deg);}
        to {-webkit-transform: rotate(360deg);}
      }
      @-moz-keyframes rotation {
        from {-moz-transform: rotate(0deg);}
        to {-moz-transform: rotate(360deg);}
      }
      @-o-keyframes rotation {
        from {-o-transform: rotate(0deg);}
        to {-o-transform: rotate(360deg);}
      }
      @keyframes rotation {
        from {transform: rotate(0deg);}
        to {transform: rotate(360deg);}
      }

    </style>
  </head>
  <body>
    <hr/>
    <figure style="overflow:visible;" id="spinner"><div class="spinner"></div><center style="margin-top:0.5em"><strong>Briarthorn</strong></center></figure>
    <div class="emscripten" id="status">Downloading...</div>
    <div class="emscripten">
      <progress value="0" max="100" id="progress" hidden=1></progress>
    </div>
    <div class="emscripten_border">
      <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
    </div>
    <hr/>
    <div class="emscripten">
      <input type="checkbox" id="resize">Resize canvas
      <input type="checkbox" id="pointerLock" checked>Lock/hide mouse pointer
      &nbsp;&nbsp;&nbsp;
      <input type="button" value="Fullscreen" onclick="Module.requestFullscreen(document.getElementById('pointerLock').checked,
                                                                                document.getElementById('resize').checked)">
    </div>

    <hr/>
    <textarea class="emscripten" id="output" rows="8"></textarea>
    <hr>
    <script type='text/javascript'>
      var statusElement = document.getElementById('status');
      var progressElement = document.getElementById('progress');
      var spinnerElement = document.getElementById('spinner');
      var canvasElement = document.getElementById('canvas');
      var outputElement = document.getElementById('output');
      if (outputElement) outputElement.value = ''; // clear browser cache

      // As a default initial behavior, pop up an alert when webgl context is lost. To make your
      // application robust, you may want to override this behavior before shipping!
      // See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
      canvasElement.addEventListener("webglcontextlost", (e) => {
        alert('WebGL context lost. You will need to reload the page.');
        e.preventDefault();
      }, false);

      function setStatus(text) {
        if (!setStatus.last) setStatus.last = { time: Date.now(), text: '' };
        if (text === setStatus.last.text) return;
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        var now = Date.now();
        if (m && now - setStatus.last.time < 30) return; // if this is a progress update, skip it if too soon
        setStatus.last.time = now;
        setStatus.last.text = text;
        if (m) {
          text = m[1];
          progressElement.value = parseInt(m[2])*100;
          progressElement.max = parseInt(m[4])*100;
          progressElement.hidden = false;
          spinnerElement.hidden = false;
        } else {
          progressElement.value = null;
          progressElement.max = null;
          progressElement.hidden = true;
          if (!text) spinnerElement.hidden = true;
        }
        statusElement.innerHTML = text;
      }

#if MODULARIZE && !EXPORT_ES6
      var moduleArgs = {
#else
      var Module = {
#endif
        print(...args) {
          // These replacements are necessary if you render to raw HTML
          //text = text.replace(/&/g, "&amp;");
          //text = text.replace(/</g, "&lt;");
          //text = text.replace(/>/g, "&gt;");
          //text = text.replace('\n', '<br>', 'g');
          console.log(...args);
          if (outputElement) {
            var text = args.join(' ');
            outputElement.value += text + "\n";
            outputElement.scrollTop = outputElement.scrollHeight; // focus on bottom
          }
        },
        canvas: canvasElement,
        setStatus: setStatus,
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
      };
      setStatus('Downloading...');
      window.onerror = window.onunhandledrejection = () => {
        setStatus('Exception thrown, see JavaScript console');
        spinnerElement.style.display = 'none';
        setStatus = (text) => {
          if (text) console.error('[post-exception status] ' + text);
        };
      };
    </script>
    {{{ SCRIPT }}}
#if MODULARIZE && !EXPORT_ES6
    <script type='text/javascript'>
      {{{ EXPORT_NAME }}}(moduleArgs);
    </script>
#endif
  </body>
</html>
