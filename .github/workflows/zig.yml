name: zig

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-24.04

    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    outputs:
      image: ${{ steps.docker-image.outputs.image }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/docker-image
        id: docker-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Linux runs natively; android and wasm cross-compile from the same linux
  # host. All three build inside the devcontainer image, which ships the pinned
  # zig, the NDK, and the emsdk installer. Tests are desktop-only: the vcpkg
  # manifest omits gtest for android/wasm, so `zig build test` runs on linux
  # only.
  container:
    runs-on: ubuntu-24.04
    needs: docker

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            args: ""
            test: true
          - name: wasm
            args: "-Dtarget=wasm32-emscripten"
            emscripten: true
          - name: android
            args: "-Dtarget=aarch64-linux-android"

    container:
      image: ${{ needs.docker.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/get-vcpkg

      # The emsdk submodule ships only the installer; bootstrap the toolchain
      # into the git-ignored per-host prefix the wasm build reads from. The
      # cache key tracks the submodule's pinned release list (what "latest"
      # resolves to), mirroring the web (CMake) workflow.
      - name: restore-emscripten-cache
        if: matrix.emscripten
        uses: actions/cache@v4
        with:
          path: .emsdk
          key: emsdk-${{ runner.os }}-${{ hashFiles('emsdk/emscripten-releases-tags.json') }}

      - name: bootstrap-emscripten
        if: matrix.emscripten
        shell: bash
        run: ./scripts/bootstrap-emsdk.sh

      - name: zig-build
        shell: bash
        run: zig build ${{ matrix.args }} --summary all

      - name: zig-test
        if: matrix.test
        shell: bash
        run: zig build test --summary all

  # macOS and Windows must build on a matching host: their desktop dependencies
  # need system libraries (Cocoa/Win32) that only exist there. zig drives vcpkg
  # to build the dependencies with the same compiler as the app.
  desktop:
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            runner: macos-15
          - name: windows
            runner: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: lukka/get-cmake@latest

      - uses: ./.github/actions/get-vcpkg

      # Some vcpkg port builds probe for dependencies through pkg-config, which
      # the macOS runner image does not ship by default.
      - name: install-pkg-config
        if: matrix.name == 'macos'
        run: brew install pkg-config

      - name: read-zig-version
        id: zig-version
        shell: bash
        run: echo "version=$(cat .zigversion)" >> "$GITHUB_OUTPUT"

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ steps.zig-version.outputs.version }}

      - name: zig-build
        shell: bash
        run: zig build --summary all

      - name: zig-test
        shell: bash
        run: zig build test --summary all
