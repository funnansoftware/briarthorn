name: linux

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-24.04

    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    outputs:
      image: ${{ steps.docker-image.outputs.image }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/docker-image
        id: docker-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  linux-lint:
    runs-on: ubuntu-24.04
    needs: docker
    strategy:
      matrix:
        target:
          - clang-format-check
          - clang-tidy-diff

    container:
      image: ${{ needs.docker.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: ./.github/actions/get-vcpkg

      - name: cmake-configure
        shell: bash
        run: cmake --preset x64-linux-clang-debug

      - name: cmake-build
        shell: bash
        run: cmake --build --preset x64-linux-clang-debug

      - name: ${{ matrix.target }}
        shell: bash
        run: cmake --build --preset x64-linux-clang-debug --target ${{ matrix.target }}

  linux-build:
    runs-on: ubuntu-24.04
    needs: docker
    strategy:
      matrix:
        include:
          - preset: x64-linux-gcc-release
            test: true
          - preset: x64-linux-clang-debug
            test: true
          # - preset: x64-linux-clang-arm64-android-release
          #   test: false
          - preset: x64-linux-emcc-release
            test: false

    container:
      image: ${{ needs.docker.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/get-vcpkg

      # The emsdk submodule ships only the installer scripts; the toolchain
      # (referenced by the emcc preset's VCPKG_CHAINLOAD_TOOLCHAIN_FILE) is
      # bootstrapped into the git-ignored per-host prefix .emsdk/Linux. The
      # cache key tracks the submodule's pinned release list, which determines
      # what "latest" resolves to.
      - name: restore-emscripten-cache
        if: contains(matrix.preset, 'emcc')
        uses: actions/cache@v4
        with:
          path: .emsdk
          key: emsdk-${{ runner.os }}-${{ hashFiles('emsdk/emscripten-releases-tags.json') }}

      - name: bootstrap-emscripten
        if: contains(matrix.preset, 'emcc')
        shell: bash
        run: ./scripts/bootstrap-emsdk.sh

      - name: cmake-configure
        shell: bash
        run: cmake --preset ${{ matrix.preset }}

      - name: cmake-build
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }} --parallel $(( $(nproc --all) + 1 ))

      - name: cmake-test
        if: matrix.test
        shell: bash
        run: ctest --preset ${{ matrix.preset }} --parallel $(( $(nproc --all) + 1 ))

      - name: cmake-install
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }} --target install