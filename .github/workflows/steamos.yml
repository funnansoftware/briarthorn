name: steamos

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-24.04

    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    outputs:
      image: ${{ steps.docker-image.outputs.image }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/docker-image
        id: docker-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          image-tag: steamos
          context: .devcontainer/steamos
          filters: |
            changed:
              - '.devcontainer/steamos/**'

  # SteamOS is x86_64 glibc Linux, so a native `zig build` produces a Steam Deck
  # binary — the sniper base (glibc 2.31) is what makes it run there. zig bundles
  # its own clang + libc++, so the app's only dynamic deps are glibc and the
  # system X11/GL libraries the Deck already ships.
  steamos-build:
    runs-on: ubuntu-24.04
    needs: docker

    container:
      image: ${{ needs.docker.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/get-vcpkg

      - name: zig-build
        shell: bash
        run: zig build --summary all

      - name: zig-test
        shell: bash
        run: zig build test --summary all

      # The whole point of the sniper container is a low glibc floor. Assert the
      # binary references nothing newer than sniper's GLIBC_2.31, so a regression
      # (e.g. a base-image bump) that would break the Deck fails loudly here.
      - name: verify-glibc-floor
        shell: bash
        run: |
          bin=build/x86_64-linux-gnu-releasefast/installed/bin/briarthorn-app
          max=$(objdump -T "$bin" | grep -oE 'GLIBC_[0-9]+\.[0-9]+(\.[0-9]+)?' | sort -uV | tail -1)
          echo "highest glibc symbol required: ${max:-none}"
          if [ -n "$max" ] && [ "$(printf '%s\nGLIBC_2.31\n' "$max" | sort -V | tail -1)" != "GLIBC_2.31" ]; then
            echo "::error::$bin requires $max, above the sniper floor GLIBC_2.31"
            exit 1
          fi

      - name: upload-build
        uses: actions/upload-artifact@v4
        with:
          name: steamos-build
          path: build/x86_64-linux-gnu-releasefast/installed
