name: android

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-24.04

    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    outputs:
      image: ${{ steps.docker-image.outputs.image }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/docker-image
        id: docker-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  android-build:
    runs-on: ubuntu-24.04
    needs: docker

    container:
      image: ${{ needs.docker.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/get-vcpkg

      - name: cmake-configure
        shell: bash
        run: cmake --preset android-release

      - name: cmake-build
        shell: bash
        run: cmake --build --preset android-release --parallel $(( $(nproc --all) + 1 ))

      # gradle locates the SDK through android/local.properties, which is
      # gitignored; generate it from the container's ANDROID_HOME before the
      # apk target invokes the gradle wrapper.
      - name: write-local-properties
        shell: bash
        run: echo "sdk.dir=${ANDROID_HOME}" > android/local.properties

      - name: build-apk
        shell: bash
        run: cmake --build --preset android-release --target apk

      - name: upload-apk
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/android-release/outputs/apk/release/app-release.apk
